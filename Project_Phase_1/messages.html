<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maseera - Messages</title>
  <link rel="stylesheet" href="styles/messages.css">
  <script src="./for_you_data.js"></script>
<script>
  // Override or enhance existing functions with data-persistent versions
  
  // Initialize data on page load
  document.addEventListener('DOMContentLoaded', function() {
    // Ensure data store is initialized
    getData();
    
    // Render initial feed
    renderFeed('postsContainer', 'for-you');
    
    // Update following list in sidebar
    updateFollowingList();
  });
  
  // Override switchTab to use data layer
  window.switchTab = function(tab, el) {
    // Update active tab UI
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    if (el) el.classList.add('active');
    
    // Hide empty states
    document.getElementById('feedEmptyState').style.display = 'none';
    
    // Render appropriate feed
    renderFeed('postsContainer', tab);
  };
  
  // Update following list in sidebar
  function updateFollowingList() {
    const currentUser = getCurrentUser();
    const data = getData();
    const followingList = document.querySelector('.following-list');
    
    if (!followingList || !currentUser || !currentUser.following) return;
    
    // Clear existing items (keep only the first few as static examples or regenerate)
    // This is simplified - in a real app you'd regenerate the entire list
    const followingUsers = currentUser.following
      .map(userId => data.users.find(u => u.id === userId))
      .filter(Boolean);
    
    // You could update the following list here
  }
  
  // Override openComments to use data layer
  window.openComments = function(postId) {
    activePostId = postId;
    const comments = getCommentsForPost(postId);
    const post = getData().posts.find(p => p.id === postId);
    const author = post ? post.author : 'unknown';
    
    document.getElementById('commentsEmptyState').style.display = 'none';
    document.getElementById('commentsActive').style.display = 'flex';
    document.getElementById('commentsPostLabel').textContent = `@${author}'s post`;
    document.getElementById('dynamicCommentTotal').textContent = formatCount(comments.length);
    
    renderCommentList(comments, postId);
    document.getElementById('commentInput').focus();
  };
  
  // Override renderCommentList to use data
  function renderCommentList(comments, postId) {
    const list = document.getElementById('dynamicCommentsList');
    const currentUser = getCurrentUser();
    const data = getData();
    
    if (!comments || comments.length === 0) {
      list.innerHTML = `<li style="text-align:center;color:#808080;padding:24px 0;font-size:14px;">No comments yet. Be the first!</li>`;
      return;
    }
    
    list.innerHTML = comments.map(c => {
      const commentUser = data.users.find(u => u.id === c.userId) || { displayName: c.userId, avatar: c.userId.charAt(0).toUpperCase() };
      
      return `
        <li class="comment-item ${c.pinned ? 'pinned' : ''}" data-comment-id="${c.id}">
          <div class="avatar-letter avatar-small">${escapeHtml(commentUser.avatar)}</div>
          <div class="comment-content">
            <div class="comment-header">
              <span class="comment-username">${escapeHtml(commentUser.displayName)}</span>
              <span class="comment-handle">@${escapeHtml(c.userId)}</span>
              ${c.pinned
                ? `<span class="pinned-badge">&#x1F4CC; Pinned</span>`
                : `<span class="comment-timestamp">${formatTimeAgo(c.timestamp)}</span>`}
            </div>
            <p class="comment-text">${escapeHtml(c.text)}</p>
            <div class="comment-footer">
              <button class="comment-like-btn" onclick="handleCommentLikeClick('${postId}', '${c.id}', this)">
                <img src="./media/icons/heart.svg" alt="" class="heart-icon-small">
                <span class="like-count">${formatCount(c.likes || 0)}</span>
              </button>
            </div>
          </div>
        </li>
      `;
    }).join('');
  }
  
  // Format timestamp as time ago
  function formatTimeAgo(timestamp) {
    if (!timestamp) return 'unknown';
    
    const now = new Date();
    const past = new Date(timestamp);
    const diffMs = now - past;
    const diffSec = Math.floor(diffMs / 1000);
    const diffMin = Math.floor(diffSec / 60);
    const diffHour = Math.floor(diffMin / 60);
    const diffDay = Math.floor(diffHour / 24);
    
    if (diffSec < 60) return 'just now';
    if (diffMin < 60) return diffMin + 'm ago';
    if (diffHour < 24) return diffHour + 'h ago';
    return diffDay + 'd ago';
  }
  
  // Handle comment like click
  window.handleCommentLikeClick = function(postId, commentId, btn) {
    const liked = toggleCommentLike(postId, commentId);
    
    btn.classList.toggle('comment-liked', liked);
    const img = btn.querySelector('.heart-icon-small');
    img.style.filter = liked 
      ? 'invert(67%) sepia(80%) saturate(400%) hue-rotate(355deg) brightness(1.1)' 
      : '';
    
    const countEl = btn.querySelector('.like-count');
    const data = getData();
    const comment = data.comments[postId]?.find(c => c.id === commentId);
    if (comment) {
      countEl.textContent = formatCount(comment.likes);
    }
  };
  
  // Override submitComment to use data layer
  window.submitComment = function(e) {
    e.preventDefault();
    const input = document.getElementById('commentInput');
    const text = input.value.trim();
    
    if (!text || !activePostId) return;
    
    const newComment = addComment(activePostId, text);
    
    if (newComment) {
      // Re-render comments
      const comments = getCommentsForPost(activePostId);
      renderCommentList(comments, activePostId);
      
      // Update comment count
      document.getElementById('dynamicCommentTotal').textContent = formatCount(comments.length);
      
      // Update count on post button
      const ccEl = document.getElementById('cc-' + activePostId);
      if (ccEl) {
        const post = getData().posts.find(p => p.id === activePostId);
        if (post) ccEl.textContent = formatCount(post.comments);
      }
      
      input.value = '';
      
      // Scroll comments to bottom
      const container = document.getElementById('dynamicCommentsContainer');
      container.scrollTop = container.scrollHeight;
    }
  };
  
  // Make sure share modal functions use the data
  window.openShareModal = function(postId, author, mediaPath) {
    // ... existing share modal code ...
    // But you might want to store the postId for later use
    window.currentSharePostId = postId;
    // ... rest of the function ...
  };
</script>
</head>

<body>

  <!-- NAVBAR -->
  <nav class="top-nav">
    <div class="nav-title">MASEERA</div>
    <div class="nav-links">
      <a href="for_you_page.html">For You</a>
      <a href="profile.html">Profile</a>
    </div>
  </nav>

  <!-- MAIN -->
  <div class="messages-layout">

    <!-- LEFT SIDE -->
    <div class="conversations-panel">

      <div class="conversation-item active" onclick="openChat('alex', this)">
        Alex Dancer
      </div>

      <div class="conversation-item" onclick="openChat('sarah', this)">
        Sarah Travels
      </div>

      <div class="conversation-item" onclick="openChat('mike', this)">
        Mike Runner
      </div>

    </div>

    <!-- RIGHT SIDE -->
    <div class="chat-panel">

      <!-- HEADER -->
      <div class="chat-header">
        <h3 id="chatName">Alex Dancer</h3>
      </div>

      <!-- MESSAGES -->
      <div class="messages-area" id="messagesArea">

        <!-- Alex -->
        <div class="chat-box" id="chat-alex">
          <div class="message received">
            <div class="msg-bubble">Hey! Did you see my latest post?</div>
          </div>

          <div class="message sent">
            <div class="msg-bubble">Yes! That transition was amazing 🔥</div>
          </div>
        </div>

        <!-- Sarah -->
        <div class="chat-box hidden" id="chat-sarah">
          <div class="message received">
            <div class="msg-bubble">That travel video was insane 🌍</div>
          </div>
        </div>

        <!-- Mike -->
        <div class="chat-box hidden" id="chat-mike">
          <div class="message received">
            <div class="msg-bubble">Training tomorrow? 🏃‍♂️</div>
          </div>
        </div>

      </div>

      <!-- INPUT -->
      <div class="message-input-area">
        <form class="message-form" onsubmit="sendMessage(event)">
          <input type="text" id="messageInput" class="message-text-input" placeholder="Type a message...">
          <button type="submit" class="send-btn">Send</button>
        </form>
      </div>

    </div>

  </div>

  <!-- JAVASCRIPT -->
  <script>
    let currentChat = "alex";

    const chatNames = {
      alex: "Alex Dancer",
      sarah: "Sarah Travels",
      mike: "Mike Runner"
    };

    function openChat(user, element) {
      currentChat = user;

      document.getElementById("chatName").textContent = chatNames[user];

      document.querySelectorAll(".chat-box").forEach(c => c.classList.add("hidden"));
      document.getElementById("chat-" + user).classList.remove("hidden");

      document.querySelectorAll(".conversation-item").forEach(c => c.classList.remove("active"));
      element.classList.add("active");
    }

    function sendMessage(e) {
      e.preventDefault();

      let input = document.getElementById("messageInput");
      let text = input.value.trim();

      if (!text) return;

      let msg = document.createElement("div");
      msg.className = "message sent";
      msg.innerHTML = `<div class="msg-bubble">${text}</div>`;

      document.getElementById("chat-" + currentChat).appendChild(msg);

      input.value = "";

      let area = document.getElementById("messagesArea");
      area.scrollTop = area.scrollHeight;
    }
  </script>

</body>

</html>
