<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account</title>
    <link rel="stylesheet" href="styles/signup.css">
</head>

<body>

    <div class="form-box">
        <h1>Create Account</h1>

        <form id="createForm">
            <label for="firstName">First Name</label>
            <input type="text" id="firstName" required>

            <label for="lastName">Last Name</label>
            <input type="text" id="lastName" required>

            <label for="email">Email</label>
            <input type="email" id="email" required>

            <label for="newUsername">Username</label>
            <input type="text" id="newUsername" required>

            <label for="newPassword">Password</label>
            <input type="password" id="newPassword" required>

            <button type="submit">Create Account</button>
        </form>

        <p id="createMessage"></p>

        <p class="link-text">
            Already have an account?
            <a href="login.html">Login</a>
        </p>
    </div>

    <script>
        document.getElementById("createForm").addEventListener("submit", function (event) {
            event.preventDefault();

            let firstName = document.getElementById("firstName").value.trim();
            let lastName = document.getElementById("lastName").value.trim();
            let email = document.getElementById("email").value.trim();
            let username = document.getElementById("newUsername").value.trim();
            let password = document.getElementById("newPassword").value.trim();
            let message = document.getElementById("createMessage");

            if (firstName === "" || lastName === "" || email === "" || username === "" || password === "") {
                message.textContent = "Please fill in all fields.";
                return;
            }

            localStorage.setItem("savedFirstName", firstName);
            localStorage.setItem("savedLastName", lastName);
            localStorage.setItem("savedEmail", email);
            localStorage.setItem("savedUsername", username);
            localStorage.setItem("savedPassword", password);

            message.textContent = "Account created successfully. Go to login page.";
            document.getElementById("createForm").reset();
        });
    </script>

</body>

</html>
