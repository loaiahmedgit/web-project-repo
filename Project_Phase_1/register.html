<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account</title>
    <link rel="stylesheet" href="styles/signup.css">
</head>

<body>

    <div class="form-box">
        <h1>Create Account</h1>

        <form id="createForm">
            <label>First Name</label>
            <input type="text" id="firstName" required>

            <label>Last Name</label>
            <input type="text" id="lastName" required>

            <label>Email</label>
            <input type="email" id="email" required>

            <label>Username</label>
            <input type="text" id="newUsername" required>

            <label>Password</label>
            <input type="password" id="newPassword" required>

            <p id="passwordHint" style="font-size:14px; margin-top:5px;"></p>

            <button type="submit">Create Account</button>
        </form>

        <p id="createMessage"></p>

        <p class="link-text">
            Already have an account?
            <a href="login.html">Login</a>
        </p>
    </div>

    <script>
        let passwordInput = document.getElementById("newPassword");
        let hint = document.getElementById("passwordHint");

        passwordInput.addEventListener("input", function () {

            let value = passwordInput.value;

            let hasUpper = /[A-Z]/.test(value);
            let hasLower = /[a-z]/.test(value);
            let hasNumber = /\d/.test(value);
            let isLong = value.length >= 6;

            if (value.length === 0) {
                hint.textContent = "";
                return;
            }

            if (hasUpper && hasLower && hasNumber && isLong) {
                hint.textContent = "Strong password ✅";
                hint.style.color = "lightgreen";
            } else {
                hint.textContent = "Weak password ❌ (Use A, a, 1 and 6+ chars)";
                hint.style.color = "red";
            }
        });

        document.getElementById("createForm").addEventListener("submit", function (event) {
            event.preventDefault();

            let user = {
                firstName: document.getElementById("firstName").value.trim(),
                lastName: document.getElementById("lastName").value.trim(),
                email: document.getElementById("email").value.trim(),
                username: document.getElementById("newUsername").value.trim(),
                password: passwordInput.value.trim()
            };

            let strongPassword = /^(?=.*[A-Z])(?=.*[a-z])(?=.*\d).{6,}$/;

            if (!strongPassword.test(user.password)) {
                document.getElementById("createMessage").textContent =
                    "Password is not strong enough.";
                return;
            }

            if (Object.values(user).includes("")) {
                document.getElementById("createMessage").textContent =
                    "Please fill in all fields.";
                return;
            }

            localStorage.setItem("user", JSON.stringify(user));
            localStorage.setItem("registeredUser_" + user.username, JSON.stringify(user));

            document.getElementById("createMessage").textContent =
                "Account created successfully!";
            document.getElementById("createForm").reset();
        });
    </script>

</body>

</html>
