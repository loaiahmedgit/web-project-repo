<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>

    <link rel="stylesheet" href="styles/profile.css">

    <script src="media-store.js"></script>
</head>

<body>

    <div class="profile-card">

        <!-- TOP BAR -->
        <div class="top-bar">
            <div class="menu-icon" onclick="toggleMenu()">☰</div>

            <div class="site-logo">
                <img src="media/images/Orange Flash Logo.png">
            </div>
        </div>

        <!-- SIDE MENU -->
        <div class="side-menu" id="sideMenu">
            <a href="profile.html">Profile</a>
            <a href="create.html">Create Post</a>
            <a href="for_you_page.html">For You</a>
            <a href="#" onclick="logoutUser()">Logout</a>
        </div>

        <!-- COVER -->
        <div class="cover"></div>

        <!-- PROFILE INFO -->
        <div class="profile-info">

            <div class="avatar" id="avatarLetter">A</div>

            <h2 id="profileName"></h2>
            <p class="username" id="profileUsername"></p>

            <div class="buttons">
                <button class="edit-btn">Edit Profile</button>
                <button class="message" onclick="window.location.href='messages.html'">Message</button>
            </div>

            <!-- STATS -->
            <div class="stats">
                <div>
                    <h3>273</h3>
                    <p>Followers</p>
                </div>
                <div>
                    <h3>1070</h3>
                    <p>Following</p>
                </div>
                <div>
                    <h3>860</h3>
                    <p>Likes</p>
                </div>
                <div>
                    <h3 id="postCountStat">0</h3>
                    <p>Posts</p>
                </div>
            </div>

            <!-- POSTS -->
            <div class="posts-section">
                <h2>User Posts</h2>
                <div class="posts-grid" id="postsGrid"></div>
            </div>

            <footer class="footer">
                © 2026 Maseera
            </footer>

        </div>
    </div>

    <script>
        // ================= USER =================

        const params = new URLSearchParams(window.location.search);
        const userIdFromURL = params.get("user");

        let currentUser = JSON.parse(localStorage.getItem("user"));
        if (!currentUser) { window.location.href = "login.html"; }

        // maseera_data for looking up demo users
        const maseeraData = JSON.parse(localStorage.getItem("maseera_data") || "null");

        // The profile being viewed
        let isOwnProfile = true;
        let profileUserId = currentUser ? currentUser.username : null;
        let displayName   = currentUser ? ((currentUser.firstName || '') + ' ' + (currentUser.lastName || '')).trim() : '';
        let displayHandle = currentUser ? currentUser.username : '';

        if (userIdFromURL && userIdFromURL !== (currentUser && currentUser.username)) {
            isOwnProfile = false;
            profileUserId = userIdFromURL;

            // Try to find richer info in maseera_data
            const maseeraUser = maseeraData && maseeraData.users.find(
                u => u.id === userIdFromURL || u.username === userIdFromURL
            );
            if (maseeraUser) {
                displayName   = maseeraUser.displayName || maseeraUser.username;
                displayHandle = maseeraUser.username;
            } else {
                displayName   = userIdFromURL;
                displayHandle = userIdFromURL;
            }
        }

        document.getElementById("profileName").textContent    = displayName;
        document.getElementById("profileUsername").textContent = "@" + displayHandle;
        document.getElementById("avatarLetter").textContent    = displayHandle.charAt(0).toUpperCase();

        // Show/hide buttons based on own vs other profile
        const btnsEl = document.querySelector(".buttons");
        if (!isOwnProfile) {
            // Check if already following
            const myMaseeraUser = maseeraData && maseeraData.users.find(
                u => u.id === currentUser.username || u.username === currentUser.username
            );
            const alreadyFollowing = myMaseeraUser && myMaseeraUser.following &&
                myMaseeraUser.following.includes(profileUserId);

            btnsEl.innerHTML = `
                <button class="edit-btn follow-profile-btn" id="followProfileBtn"
                    onclick="toggleFollowProfile(this)"
                    data-following="${alreadyFollowing ? '1' : '0'}">
                    ${alreadyFollowing ? 'Following' : '+ Follow'}
                </button>
                <button class="message" onclick="window.location.href='messages.html'">Message</button>
            `;
        }

        // Follow from profile page
        function toggleFollowProfile(btn) {
            const data        = JSON.parse(localStorage.getItem('maseera_data') || '{}');
            const loggedInId  = currentUser ? currentUser.username : null;
            if (!loggedInId) return;

            let me = data.users && data.users.find(u => u.id === loggedInId || u.username === loggedInId);
            if (!me) {
                me = { id: loggedInId, username: loggedInId, displayName: displayName, following: [], followers: 0 };
                if (!data.users) data.users = [];
                data.users.push(me);
            }
            if (!me.following) me.following = [];

            const idx = me.following.indexOf(profileUserId);
            if (idx === -1) {
                me.following.push(profileUserId);
                btn.textContent = 'Following';
                btn.dataset.following = '1';
                btn.style.background = 'linear-gradient(135deg,#8A1538,#F5A623)';
                btn.style.color = '#fff';
                btn.style.borderColor = 'transparent';
                // update follower count on target user
                const target = data.users.find(u => u.id === profileUserId || u.username === profileUserId);
                if (target) target.followers = (target.followers || 0) + 1;
            } else {
                me.following.splice(idx, 1);
                btn.textContent = '+ Follow';
                btn.dataset.following = '0';
                btn.style.background = 'transparent';
                btn.style.color = '';
                btn.style.borderColor = '';
                const target = data.users.find(u => u.id === profileUserId || u.username === profileUserId);
                if (target) target.followers = Math.max(0, (target.followers || 0) - 1);
            }

            // Persist
            const meIdx = data.users.findIndex(u => u.id === loggedInId || u.username === loggedInId);
            if (meIdx !== -1) data.users[meIdx] = me;
            localStorage.setItem('maseera_data', JSON.stringify(data));
        }

        // Show follower count from maseera_data if available
        if (maseeraData) {
            const mu = maseeraData.users.find(u => u.id === profileUserId || u.username === profileUserId);
            if (mu) {
                const statsEl = document.querySelector('.stats');
                if (statsEl) {
                    statsEl.children[0].querySelector('h3').textContent = (mu.followers || 0).toLocaleString();
                    statsEl.children[1].querySelector('h3').textContent = ((mu.following && mu.following.length) || 0).toLocaleString();
                }
            }
        }

        // ================= POSTS =================

        function loadPosts() {
            const grid = document.getElementById("postsGrid");
            grid.innerHTML = "";
            let allPosts = [];

            // 1. Posts from userPosts (create.html uploads)
            const userPosts = JSON.parse(localStorage.getItem("userPosts") || "[]");
            // Only include posts explicitly authored by this user
            const up = userPosts.filter(p => p.author === profileUserId);
            up.forEach(p => allPosts.push({ ...p, _source: 'userPosts' }));

            // 2. Posts from maseera_data (demo posts) — always read fresh from localStorage
            const freshMaseeraData = JSON.parse(localStorage.getItem("maseera_data") || "null");
            if (freshMaseeraData && freshMaseeraData.posts) {
                freshMaseeraData.posts.filter(p => p.author === profileUserId).forEach(p => {
                    allPosts.push({ ...p, _source: 'maseera' });
                });
            }

            document.getElementById("postCountStat").textContent = allPosts.length;

            if (!allPosts.length) {
                grid.innerHTML = "<p style='color:#808080;padding:20px;'>No posts yet</p>";
                return;
            }

            allPosts.forEach(post => {
                const div = document.createElement("div");
                div.className = "post";
                div.style.cursor = "pointer";
                const canDelete = isOwnProfile;

                div.innerHTML = `
                    ${(post.fileType === 'video' || post.type === 'video')
                        ? `<video class="post-media" autoplay muted loop playsinline></video>`
                        : `<img class="post-media" alt="post">`}
                    ${canDelete
                        ? `<button class="delete-post-btn" onclick="event.stopPropagation(); deletePost('${post.id}', this, '${post._source}')">✕</button>`
                        : ""}
                    <div class="post-overlay">
                        <div class="overlay-item">
                            <img src="media/icons/heart.svg">
                            <span>${post.likes || 0}</span>
                        </div>
                        <div class="overlay-item">
                            <img src="media/icons/comments.svg">
                            <span>${post.comments || 0}</span>
                        </div>
                    </div>
                `;

                div.addEventListener("click", function () {
                    const url = "post.html?post=" + encodeURIComponent(post.id) +
                        "&author=" + encodeURIComponent(post.author || profileUserId) +
                        "&caption=" + encodeURIComponent(post.caption || '') +
                        "&source=" + encodeURIComponent(post._source || 'maseera');
                    window.location.href = url;
                });
                grid.appendChild(div);

                const mediaEl = div.querySelector(".post-media");
                if (post._source === 'maseera') {
                    mediaEl.src = post.mediaPath;
                } else if (post.mediaKey) {
                    MediaStore.getURL(post.mediaKey).then(url => { if (url) mediaEl.src = url; });
                } else if (post.mediaURL) {
                    // Legacy posts stored data URL directly in localStorage
                    mediaEl.src = post.mediaURL;
                }
            });
        }

        loadPosts();

        // ================= DELETE =================

        function deletePost(id, btn, source) {
            if (source === 'maseera') {
                const data = JSON.parse(localStorage.getItem('maseera_data') || '{}');
                if (data.posts) {
                    data.posts = data.posts.filter(p => String(p.id) !== String(id));
                    delete (data.comments || {})[id];
                    delete (data.likes || {})[id];
                    localStorage.setItem('maseera_data', JSON.stringify(data));
                }
            } else {
                let posts = JSON.parse(localStorage.getItem("userPosts") || "[]");
                const post = posts.find(p => String(p.id) === String(id));
                if (post && post.mediaKey) MediaStore.remove(post.mediaKey);
                posts = posts.filter(p => String(p.id) !== String(id));
                localStorage.setItem("userPosts", JSON.stringify(posts));
            }
            loadPosts();
        }

        // ================= MENU =================

        function toggleMenu() {
            let menu = document.getElementById("sideMenu");
            menu.style.left = menu.style.left === "0px" ? "-220px" : "0px";
        }

        // ================= LOGOUT =================

        function logoutUser() {
            localStorage.removeItem("user");
            window.location.href = "login.html";
        }

    </script>

</body>

</html>
