<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="stylesheet" href="styles/profile.css">
</head>
<body>

<div class="profile-card">

    <div class="top-bar">
        <div class="menu-icon" onclick="toggleMenu()">☰</div>

        <div class="site-logo">
            <img src="media/images/Orange Flash Logo.png">
        </div>
    </div>

    <div class="side-menu" id="sideMenu">
        <a href="profile.html">Profile</a>
        <a href="create.html">Create Post</a>
        <a href="for_you_page.html">For You</a>
        <a href="#" onclick="logoutUser()">Logout</a>
    </div>

    <div class="cover"></div>

    <div class="profile-info">

        <div class="avatar" id="avatarLetter">A</div>

        <h2 id="profileName"></h2>

        <p class="username" id="profileUsername"></p>

        <div class="buttons">
            <button class="follow">Follow</button>
            <button class="message">Message</button>
        </div>

        <div class="stats">
            <div><h3>273</h3><p>Followers</p></div>
            <div><h3>1070</h3><p>Following</p></div>
            <div><h3>860</h3><p>Likes</p></div>
            <div><h3>3</h3><p>Posts</p></div>
        </div>

        <div class="posts-section">
            <h2>User Posts</h2>

            <div class="posts-grid">
                <div class="post">
                    <img src="media/images/Post_1.png">
                </div>
                <div class="post">
                    <img src="media/images/Post_2.png">
                </div>
                <div class="post">
                    <img src="media/images/Post_3.png">
                </div>
            </div>
        </div>

        <footer class="footer">
            © 2026 Your Website
        </footer>

    </div>
</div>

<script>
let currentUser = localStorage.getItem("currentUser");
let user = JSON.parse(localStorage.getItem("user"));

if (!currentUser || !user) {
    window.location.href = "login.html";
} else {
    document.getElementById("profileName").textContent =
        user.firstName + " " + user.lastName;

    document.getElementById("profileUsername").textContent =
        "@" + user.username;

    document.getElementById("avatarLetter").textContent =
        user.firstName.charAt(0).toUpperCase();
}

function logoutUser() {
    localStorage.removeItem("currentUser");
    window.location.href = "login.html";
}

function toggleMenu() {
    let menu = document.getElementById("sideMenu");

    if (menu.style.left === "0px") {
        menu.style.left = "-220px";
    } else {
        menu.style.left = "0px";
    }
}
</script>

</body>
</html>
