<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="stylesheet" href="styles/profile.css">
    <script src="media-store.js"></script>
    <script src="./for_you_data.js"></script>
    <script>
        // Override or enhance existing functions with data-persistent versions

        // Initialize data on page load
        document.addEventListener('DOMContentLoaded', function () {
            // Ensure data store is initialized
            getData();

            // Render initial feed
            renderFeed('postsContainer', 'for-you');

            // Update following list in sidebar
            updateFollowingList();
        });

        // Override switchTab to use data layer
        window.switchTab = function (tab, el) {
            // Update active tab UI
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            if (el) el.classList.add('active');

            // Hide empty states
            document.getElementById('feedEmptyState').style.display = 'none';

            // Render appropriate feed
            renderFeed('postsContainer', tab);
        };

        // Update following list in sidebar
        function updateFollowingList() {
            const currentUser = getCurrentUser();
            const data = getData();
            const followingList = document.querySelector('.following-list');

            if (!followingList || !currentUser || !currentUser.following) return;

            // Clear existing items (keep only the first few as static examples or regenerate)
            // This is simplified - in a real app you'd regenerate the entire list
            const followingUsers = currentUser.following
                .map(userId => data.users.find(u => u.id === userId))
                .filter(Boolean);

            // You could update the following list here
        }

        // Override openComments to use data layer
        window.openComments = function (postId) {
            activePostId = postId;
            const comments = getCommentsForPost(postId);
            const post = getData().posts.find(p => p.id === postId);
            const author = post ? post.author : 'unknown';

            document.getElementById('commentsEmptyState').style.display = 'none';
            document.getElementById('commentsActive').style.display = 'flex';
            document.getElementById('commentsPostLabel').textContent = `@${author}'s post`;
            document.getElementById('dynamicCommentTotal').textContent = formatCount(comments.length);

            renderCommentList(comments, postId);
            document.getElementById('commentInput').focus();
        };

        // Override renderCommentList to use data
        function renderCommentList(comments, postId) {
            const list = document.getElementById('dynamicCommentsList');
            const currentUser = getCurrentUser();
            const data = getData();

            if (!comments || comments.length === 0) {
                list.innerHTML = `<li style="text-align:center;color:#808080;padding:24px 0;font-size:14px;">No comments yet. Be the first!</li>`;
                return;
            }

            list.innerHTML = comments.map(c => {
                const commentUser = data.users.find(u => u.id === c.userId) || { displayName: c.userId, avatar: c.userId.charAt(0).toUpperCase() };

                return `
        <li class="comment-item ${c.pinned ? 'pinned' : ''}" data-comment-id="${c.id}">
          <div class="avatar-letter avatar-small">${escapeHtml(commentUser.avatar)}</div>
          <div class="comment-content">
            <div class="comment-header">
              <span class="comment-username">${escapeHtml(commentUser.displayName)}</span>
              <span class="comment-handle">@${escapeHtml(c.userId)}</span>
              ${c.pinned
                        ? `<span class="pinned-badge">&#x1F4CC; Pinned</span>`
                        : `<span class="comment-timestamp">${formatTimeAgo(c.timestamp)}</span>`}
            </div>
            <p class="comment-text">${escapeHtml(c.text)}</p>
            <div class="comment-footer">
              <button class="comment-like-btn" onclick="handleCommentLikeClick('${postId}', '${c.id}', this)">
                <img src="./media/icons/heart.svg" alt="" class="heart-icon-small">
                <span class="like-count">${formatCount(c.likes || 0)}</span>
              </button>
            </div>
          </div>
        </li>
      `;
            }).join('');
        }

        // Format timestamp as time ago
        function formatTimeAgo(timestamp) {
            if (!timestamp) return 'unknown';

            const now = new Date();
            const past = new Date(timestamp);
            const diffMs = now - past;
            const diffSec = Math.floor(diffMs / 1000);
            const diffMin = Math.floor(diffSec / 60);
            const diffHour = Math.floor(diffMin / 60);
            const diffDay = Math.floor(diffHour / 24);

            if (diffSec < 60) return 'just now';
            if (diffMin < 60) return diffMin + 'm ago';
            if (diffHour < 24) return diffHour + 'h ago';
            return diffDay + 'd ago';
        }

        // Handle comment like click
        window.handleCommentLikeClick = function (postId, commentId, btn) {
            const liked = toggleCommentLike(postId, commentId);

            btn.classList.toggle('comment-liked', liked);
            const img = btn.querySelector('.heart-icon-small');
            img.style.filter = liked
                ? 'invert(67%) sepia(80%) saturate(400%) hue-rotate(355deg) brightness(1.1)'
                : '';

            const countEl = btn.querySelector('.like-count');
            const data = getData();
            const comment = data.comments[postId]?.find(c => c.id === commentId);
            if (comment) {
                countEl.textContent = formatCount(comment.likes);
            }
        };

        // Override submitComment to use data layer
        window.submitComment = function (e) {
            e.preventDefault();
            const input = document.getElementById('commentInput');
            const text = input.value.trim();

            if (!text || !activePostId) return;

            const newComment = addComment(activePostId, text);

            if (newComment) {
                // Re-render comments
                const comments = getCommentsForPost(activePostId);
                renderCommentList(comments, activePostId);

                // Update comment count
                document.getElementById('dynamicCommentTotal').textContent = formatCount(comments.length);

                // Update count on post button
                const ccEl = document.getElementById('cc-' + activePostId);
                if (ccEl) {
                    const post = getData().posts.find(p => p.id === activePostId);
                    if (post) ccEl.textContent = formatCount(post.comments);
                }

                input.value = '';

                // Scroll comments to bottom
                const container = document.getElementById('dynamicCommentsContainer');
                container.scrollTop = container.scrollHeight;
            }
        };

        // Make sure share modal functions use the data
        window.openShareModal = function (postId, author, mediaPath) {
            // ... existing share modal code ...
            // But you might want to store the postId for later use
            window.currentSharePostId = postId;
            // ... rest of the function ...
        };
    </script>
</head>

<body>

    <div class="profile-card">

        <div class="top-bar">
            <div class="menu-icon" onclick="toggleMenu()">☰</div>

            <div class="site-logo">
                <img src="media/images/Orange Flash Logo.png">
            </div>
        </div>

        <div class="side-menu" id="sideMenu">
            <a href="profile.html">Profile</a>
            <a href="create.html">Create Post</a>
            <a href="for_you_page.html">For You</a>
            <a href="#" onclick="logoutUser()">Logout</a>
        </div>

        <div class="cover"></div>

        <div class="profile-info">

            <div class="avatar" id="avatarLetter">A</div>

            <h2 id="profileName"></h2>

            <p class="username" id="profileUsername"></p>

            <div class="buttons">
                <button class="follow">Follow</button>
                <button class="message" onclick="window.location.href='messages.html'">Message</button>
            </div>

            <div class="stats">
                <div>
                    <h3>273</h3>
                    <p>Followers</p>
                </div>
                <div>
                    <h3>1070</h3>
                    <p>Following</p>
                </div>
                <div>
                    <h3>860</h3>
                    <p>Likes</p>
                </div>
                <div>
                    <h3 id="postCountStat">0</h3>
                    <p>Posts</p>
                </div>
            </div>

            <div class="posts-section">
                <h2>User Posts</h2>

                <div class="posts-grid" id="postsGrid"></div>
            </div>

            <footer class="footer">
                © 2026 Your Website
            </footer>

        </div>
    </div>

    <script>
        let currentUser = localStorage.getItem("currentUser");
        let user = JSON.parse(localStorage.getItem("user"));

        if (!currentUser || !user) {
            window.location.href = "login.html";
        } else {
            document.getElementById("profileName").textContent =
                user.firstName + " " + user.lastName;

            document.getElementById("profileUsername").textContent =
                "@" + user.username;

            document.getElementById("avatarLetter").textContent =
                user.firstName.charAt(0).toUpperCase();
        }

        (async function loadUserPostsOnProfile() {
            const params = new URLSearchParams(window.location.search);
            const profileId = params.get("userId");

            const data = getData();
            const profileUser = data.users.find(u => u.id === profileId);
            const currentUserData = getCurrentUser();

            const isMyProfile = currentUserData && currentUserData.id === profileId;

            // عرض الاسم
            document.getElementById("profileName").textContent = profileUser.displayName;
            document.getElementById("profileUsername").textContent = "@" + profileUser.username;
            document.getElementById("avatarLetter").textContent = profileUser.avatar;

            // إخفاء الأزرار لو مش حسابك
            if (!isMyProfile) {
                document.querySelector(".buttons").style.display = "none";
            }

            // جلب بوستات المستخدم
            const posts = data.posts.filter(p => p.author === profileId);

            document.getElementById('postCountStat').textContent = posts.length;

            const grid = document.getElementById('postsGrid');
            grid.innerHTML = "";

            if (!posts.length) {
                grid.innerHTML = '<p style="text-align:center">No posts yet</p>';
                return;
            }

            posts.forEach(post => {
                const div = document.createElement('div');
                div.className = 'post';

                const mediaHtml = post.type === 'video'
                    ? `<video src="${post.mediaPath}" muted></video>`
                    : `<img src="${post.mediaPath}">`;

                div.innerHTML = `
        ${mediaHtml}

        ${isMyProfile
                        ? `<button class="delete-post-btn">X</button>`
                        : ""
                    }

        <div class="post-overlay">
            <span>❤️ ${post.likes}</span>
            <span>💬 ${post.comments}</span>
        </div>
    `;

                grid.appendChild(div);
            });

            if (!posts.length) {
                grid.innerHTML = '<p style="color:#808080;font-size:14px;text-align:center;padding:24px;grid-column:1/-1;">No posts yet. <a href="create.html" style="color:#F5A623;">Create your first post &#x2192;</a></p>';
                return;
            }

            for (const post of posts.slice().reverse()) {
                let src;
                if (post.mediaKey) {
                    src = await MediaStore.getURL(post.mediaKey);
                } else if (post.image) {
                    src = post.image;
                }
                if (!src) continue;

                const div = document.createElement('div');
                div.className = 'post';
                div.style.cursor = 'pointer';
                const url = 'post.html?post=' + encodeURIComponent(src)
                    + '&author=' + encodeURIComponent(author)
                    + '&caption=' + encodeURIComponent(post.caption)
                    + '&isUserPost=1';
                div.onclick = (e) => {
                    if (e.target.classList.contains('delete-post-btn') || e.target.closest('.delete-post-btn')) return;
                    window.location.href = url;
                };
                const isVideo = post.fileType === 'video' || src.startsWith('data:video');
                const mediaHtml = isVideo
                    ? '<video src="' + src + '" style="width:100%;height:100%;object-fit:cover;display:block;" muted playsinline></video>'
                    : '<img src="' + src + '" alt="Your post">';
                div.innerHTML = mediaHtml
                    + '<button class="delete-post-btn" title="Delete post" onclick="deletePost(' + post.id + ', \'' + (post.mediaKey || '') + '\', this)"><img src="media/icons/trash.svg" style="width:14px;height:14px;filter:invert(1);"></button>';
                grid.appendChild(div);
            }
        })();

        function deletePost(id, mediaKey, btn) {
            if (!confirm('Delete this post?')) return;
            let posts = JSON.parse(localStorage.getItem('userPosts') || '[]');
            posts = posts.filter(p => p.id !== id);
            localStorage.setItem('userPosts', JSON.stringify(posts));
            if (mediaKey) MediaStore.remove(mediaKey);
            btn.closest('.post').remove();
            document.getElementById('postCountStat').textContent = posts.length;
            if (!posts.length) {
                document.getElementById('postsGrid').innerHTML = '<p style="color:#808080;font-size:14px;text-align:center;padding:24px;grid-column:1/-1;">No posts yet. <a href="create.html" style="color:#F5A623;">Create your first post &#x2192;</a></p>';
            }
        }

        function logoutUser() {
            localStorage.removeItem("currentUser");
            window.location.href = "login.html";
        }

        function toggleMenu() {
            let menu = document.getElementById("sideMenu");

            if (menu.style.left === "0px") {
                menu.style.left = "-220px";
            } else {
                menu.style.left = "0px";
            }
        }
    </script>

</body>

</html>
