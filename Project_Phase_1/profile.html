<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="stylesheet" href="styles/profile.css">
    <script src="media-store.js"></script>
</head>

<body>

    <div class="profile-card">

        <div class="top-bar">
            <div class="menu-icon" onclick="toggleMenu()">☰</div>
            <div class="site-logo">
                <img src="media/images/Orange Flash Logo.png">
            </div>
        </div>

        <div class="side-menu" id="sideMenu">
            <a href="profile.html">Profile</a>
            <a href="create.html">Create Post</a>
            <a href="for_you_page.html">For You</a>
            <a href="#" onclick="logoutUser()">Logout</a>
        </div>

        <div class="cover"></div>

        <div class="profile-info">

            <div class="avatar" id="avatarLetter">A</div>

            <h2 id="profileName"></h2>
            <p class="username" id="profileUsername"></p>
            <p class="bio" id="profileBio">No bio yet</p>

            <div class="buttons" id="profileButtons">
                <button class="edit-btn" onclick="openEditModal()">Edit Profile</button>
                <button class="message" onclick="window.location.href='messages.html'">Message</button>
            </div>

            <div class="stats">
                <div><h3 id="statFollowers">0</h3><p>Followers</p></div>
                <div><h3 id="statFollowing">0</h3><p>Following</p></div>
                <div><h3>860</h3><p>Likes</p></div>
                <div><h3 id="postCountStat">0</h3><p>Posts</p></div>
            </div>

            <div class="posts-section">
                <h2>User Posts</h2>
                <div class="posts-grid" id="postsGrid"></div>
            </div>

            <footer class="footer">© 2026 Maseera</footer>
        </div>
    </div>

    <!-- EDIT PROFILE MODAL -->
    <div id="editModal" class="edit-modal" onclick="handleModalBackdropClick(event)">
        <div class="edit-box">

            <div class="edit-modal-header">
                <h3>Edit Profile</h3>
                <button class="edit-modal-close" onclick="closeEditModal()">✕</button>
            </div>

            <div class="edit-modal-body">
                <div class="edit-field">
                    <label>First Name</label>
                    <input type="text" id="editFirstName" placeholder="First name">
                </div>
                <div class="edit-field">
                    <label>Last Name</label>
                    <input type="text" id="editLastName" placeholder="Last name">
                </div>
                <div class="edit-field">
                    <label>Username</label>
                    <input type="text" id="editUsername" placeholder="Username">
                    <span class="edit-field-note">Changing your username updates all your posts.</span>
                </div>
                <div class="edit-field">
                    <label>Bio</label>
                    <textarea id="editBio" placeholder="Tell people about yourself..." rows="3"></textarea>
                </div>
            </div>

            <div id="editModalError" class="edit-modal-error" style="display:none;"></div>

            <div class="edit-modal-footer">
                <button class="edit-cancel-btn" onclick="closeEditModal()">Cancel</button>
                <button class="edit-save-btn" onclick="saveProfile()">Save</button>
            </div>
        </div>
    </div>

    <script>

        // ================= USER =================

        const params        = new URLSearchParams(window.location.search);
        const userIdFromURL = params.get("user");

        let currentUser = JSON.parse(localStorage.getItem("user"));
        if (!currentUser) { window.location.href = "login.html"; }

        let isOwnProfile  = true;
        let profileUserId = currentUser ? currentUser.username : null;

        function getDisplayName(u) {
            return ((u.firstName || '') + ' ' + (u.lastName || '')).trim() || u.username || '';
        }

        // Viewing another user's profile?
        if (userIdFromURL && userIdFromURL !== (currentUser && currentUser.username)) {
            isOwnProfile  = false;
            profileUserId = userIdFromURL;

            const maseeraData = JSON.parse(localStorage.getItem("maseera_data") || "null");
            const maseeraUser = maseeraData && maseeraData.users &&
                maseeraData.users.find(u => u.id === userIdFromURL || u.username === userIdFromURL);

            const name   = maseeraUser ? (maseeraUser.displayName || maseeraUser.username) : userIdFromURL;
            const handle = maseeraUser ? maseeraUser.username : userIdFromURL;

            document.getElementById("profileName").textContent     = name;
            document.getElementById("profileUsername").textContent  = "@" + handle;
            document.getElementById("avatarLetter").textContent     = handle.charAt(0).toUpperCase();
            document.getElementById("profileBio").textContent       = "No bio yet";

            // Replace buttons with Follow / Message
            const maseeraDataFresh = JSON.parse(localStorage.getItem("maseera_data") || "{}");
            const myEntry = maseeraDataFresh.users &&
                maseeraDataFresh.users.find(u => u.id === currentUser.username || u.username === currentUser.username);
            const alreadyFollowing = myEntry && myEntry.following && myEntry.following.includes(profileUserId);

            document.getElementById("profileButtons").innerHTML = `
                <button class="edit-btn follow-profile-btn" id="followProfileBtn"
                    onclick="toggleFollowProfile(this)"
                    data-following="${alreadyFollowing ? '1' : '0'}">
                    ${alreadyFollowing ? 'Following' : '+ Follow'}
                </button>
                <button class="message" onclick="window.location.href='messages.html'">Message</button>
            `;

            if (maseeraUser) {
                document.getElementById("statFollowers").textContent = (maseeraUser.followers || 0).toLocaleString();
                document.getElementById("statFollowing").textContent = ((maseeraUser.following && maseeraUser.following.length) || 0).toLocaleString();
            }
        } else {
            // Own profile
            document.getElementById("profileName").textContent     = getDisplayName(currentUser);
            document.getElementById("profileUsername").textContent  = "@" + currentUser.username;
            document.getElementById("avatarLetter").textContent     = (currentUser.username || 'U').charAt(0).toUpperCase();
            document.getElementById("profileBio").textContent       = currentUser.bio || "No bio yet";

            const maseeraData = JSON.parse(localStorage.getItem("maseera_data") || "null");
            if (maseeraData && maseeraData.users) {
                const mu = maseeraData.users.find(u => u.id === profileUserId || u.username === profileUserId);
                if (mu) {
                    document.getElementById("statFollowers").textContent = (mu.followers || 0).toLocaleString();
                    document.getElementById("statFollowing").textContent = ((mu.following && mu.following.length) || 0).toLocaleString();
                }
            }
        }

        // ================= FOLLOW (other profile) =================

        function toggleFollowProfile(btn) {
            const data       = JSON.parse(localStorage.getItem('maseera_data') || '{}');
            const loggedInId = currentUser ? currentUser.username : null;
            if (!loggedInId) return;

            if (!data.users) data.users = [];
            let me = data.users.find(u => u.id === loggedInId || u.username === loggedInId);
            if (!me) {
                me = { id: loggedInId, username: loggedInId, displayName: getDisplayName(currentUser), following: [], followers: 0 };
                data.users.push(me);
            }
            if (!me.following) me.following = [];

            const idx = me.following.indexOf(profileUserId);
            if (idx === -1) {
                me.following.push(profileUserId);
                btn.textContent = 'Following';
                btn.dataset.following = '1';
                btn.style.background  = 'linear-gradient(135deg,#8A1538,#F5A623)';
                btn.style.color       = '#fff';
                btn.style.borderColor = 'transparent';
                const target = data.users.find(u => u.id === profileUserId || u.username === profileUserId);
                if (target) target.followers = (target.followers || 0) + 1;
            } else {
                me.following.splice(idx, 1);
                btn.textContent = '+ Follow';
                btn.dataset.following = '0';
                btn.style.background  = 'transparent';
                btn.style.color       = '';
                btn.style.borderColor = '';
                const target = data.users.find(u => u.id === profileUserId || u.username === profileUserId);
                if (target) target.followers = Math.max(0, (target.followers || 0) - 1);
            }

            const meIdx = data.users.findIndex(u => u.id === loggedInId || u.username === loggedInId);
            if (meIdx !== -1) data.users[meIdx] = me;
            localStorage.setItem('maseera_data', JSON.stringify(data));
        }

        // ================= POSTS =================

        function loadPosts() {
            const grid = document.getElementById("postsGrid");
            grid.innerHTML = "";
            let allPosts = [];

            // 1. Posts from create.html (userPosts)
            const userPostsRaw = JSON.parse(localStorage.getItem("userPosts") || "[]");
            userPostsRaw.filter(p => p.author === profileUserId)
                        .forEach(p => allPosts.push({ ...p, _source: 'userPosts' }));

            // 2. Demo posts from maseera_data — always read fresh
            const freshMaseera = JSON.parse(localStorage.getItem("maseera_data") || "null");
            if (freshMaseera && freshMaseera.posts) {
                freshMaseera.posts.filter(p => p.author === profileUserId)
                                  .forEach(p => allPosts.push({ ...p, _source: 'maseera' }));
            }

            document.getElementById("postCountStat").textContent = allPosts.length;

            if (!allPosts.length) {
                grid.innerHTML = "<p style='color:#808080;padding:20px;'>No posts yet</p>";
                return;
            }

            allPosts.forEach(post => {
                const div = document.createElement("div");
                div.className    = "post";
                div.style.cursor = "pointer";

                const isVideo = post.fileType === 'video' || post.type === 'video';

                div.innerHTML = `
                    ${isVideo
                        ? `<video class="post-media" autoplay muted loop playsinline></video>`
                        : `<img class="post-media" alt="post">`}
                    ${isOwnProfile
                        ? `<button class="delete-post-btn" onclick="event.stopPropagation(); deletePost('${post.id}', this, '${post._source}')">✕</button>`
                        : ""}
                    <div class="post-overlay">
                        <div class="overlay-item">
                            <img src="media/icons/heart.svg">
                            <span>${post.likes || 0}</span>
                        </div>
                        <div class="overlay-item">
                            <img src="media/icons/comments.svg">
                            <span>${post.comments || 0}</span>
                        </div>
                    </div>
                `;

                // Click to view post
                div.addEventListener("click", function () {
                    window.location.href = "post.html?post=" + encodeURIComponent(post.id) +
                        "&author=" + encodeURIComponent(post.author || profileUserId) +
                        "&caption=" + encodeURIComponent(post.caption || '');
                });

                grid.appendChild(div);

                // Load media
                const mediaEl = div.querySelector(".post-media");
                if (post._source === 'maseera') {
                    mediaEl.src = post.mediaPath;
                } else if (post.mediaKey) {
                    MediaStore.getURL(post.mediaKey).then(url => { if (url) mediaEl.src = url; });
                } else if (post.mediaURL) {
                    mediaEl.src = post.mediaURL;
                }
            });
        }

        loadPosts();

        // ================= DELETE =================

        function deletePost(id, btn, source) {
            if (source === 'maseera') {
                const data = JSON.parse(localStorage.getItem('maseera_data') || '{}');
                if (data.posts) {
                    data.posts = data.posts.filter(p => String(p.id) !== String(id));
                    if (data.comments) delete data.comments[id];
                    if (data.likes)    delete data.likes[id];
                    localStorage.setItem('maseera_data', JSON.stringify(data));
                }
            } else {
                let posts = JSON.parse(localStorage.getItem("userPosts") || "[]");
                const post = posts.find(p => String(p.id) === String(id));
                if (post && post.mediaKey) MediaStore.remove(post.mediaKey);
                posts = posts.filter(p => String(p.id) !== String(id));
                localStorage.setItem("userPosts", JSON.stringify(posts));
            }
            loadPosts();
        }

        // ================= EDIT PROFILE =================

        function openEditModal() {
            const u = JSON.parse(localStorage.getItem('user') || '{}');
            document.getElementById('editFirstName').value  = u.firstName || '';
            document.getElementById('editLastName').value   = u.lastName  || '';
            document.getElementById('editUsername').value   = u.username  || '';
            document.getElementById('editBio').value        = u.bio       || '';
            document.getElementById('editModalError').style.display = 'none';
            document.getElementById('editModal').style.display      = 'flex';
        }

        function closeEditModal() {
            document.getElementById('editModal').style.display = 'none';
        }

        function handleModalBackdropClick(e) {
            if (e.target === document.getElementById('editModal')) closeEditModal();
        }

        function saveProfile() {
            const firstName = document.getElementById('editFirstName').value.trim();
            const lastName  = document.getElementById('editLastName').value.trim();
            const username  = document.getElementById('editUsername').value.trim().toLowerCase().replace(/\s+/g, '_');
            const bio       = document.getElementById('editBio').value.trim();
            const errorEl   = document.getElementById('editModalError');

            if (!username) {
                errorEl.textContent    = 'Username cannot be empty.';
                errorEl.style.display  = 'block';
                return;
            }
            if (!/^[a-z0-9_]+$/.test(username)) {
                errorEl.textContent    = 'Username can only contain letters, numbers and underscores.';
                errorEl.style.display  = 'block';
                return;
            }

            const u           = JSON.parse(localStorage.getItem('user') || '{}');
            const oldUsername = u.username;

            // If username changed, update all owned posts and maseera_data
            if (oldUsername && username !== oldUsername) {
                const userPosts = JSON.parse(localStorage.getItem('userPosts') || '[]');
                userPosts.forEach(p => { if (p.author === oldUsername) p.author = username; });
                localStorage.setItem('userPosts', JSON.stringify(userPosts));

                const mData = JSON.parse(localStorage.getItem('maseera_data') || '{}');
                if (mData.users) {
                    const mu = mData.users.find(u => u.id === oldUsername || u.username === oldUsername);
                    if (mu) {
                        mu.id          = username;
                        mu.username    = username;
                        mu.displayName = (firstName + ' ' + lastName).trim() || username;
                    }
                }
                localStorage.setItem('maseera_data', JSON.stringify(mData));
            }

            // Save updated user object
            u.firstName = firstName;
            u.lastName  = lastName;
            u.username  = username;
            u.bio       = bio;
            localStorage.setItem('user', JSON.stringify(u));

            // Update page immediately
            const fullName = (firstName + ' ' + lastName).trim() || username;
            document.getElementById('profileName').textContent     = fullName;
            document.getElementById('profileUsername').textContent  = '@' + username;
            document.getElementById('avatarLetter').textContent     = username.charAt(0).toUpperCase();
            document.getElementById('profileBio').textContent       = bio || 'No bio yet';

            // Keep in-memory state in sync
            currentUser   = u;
            profileUserId = username;

            closeEditModal();
            loadPosts();
        }

        // ================= MENU =================

        function toggleMenu() {
            const menu = document.getElementById("sideMenu");
            menu.style.left = menu.style.left === "0px" ? "-220px" : "0px";
        }

        // ================= LOGOUT =================

        function logoutUser() {
            localStorage.removeItem("user");
            window.location.href = "login.html";
        }

    </script>

</body>

</html>
