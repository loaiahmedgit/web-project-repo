<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>

    <link rel="stylesheet" href="styles/profile.css">
    <script src="media-store.js"></script>

</head>

<body>

    <div class="profile-card">

        <div class="top-bar">
            <div class="menu-icon" onclick="toggleMenu()">☰</div>

            <div class="site-logo">
                <img src="media/images/Orange Flash Logo.png">
            </div>
        </div>

        <div class="side-menu" id="sideMenu">
            <a href="profile.html">Profile</a>
            <a href="create.html">Create Post</a>
            <a href="for_you_page.html">For You</a>
            <a href="#" onclick="logoutUser()">Logout</a>
        </div>

        <div class="cover"></div>

        <div class="profile-info">

            <div class="avatar" id="avatarLetter">A</div>

            <h2 id="profileName"></h2>
            <p class="username" id="profileUsername"></p>

            <p class="bio" id="profileBio">No bio yet</p>

            <div class="buttons">
                <button class="edit-btn" onclick="openEditModal()">Edit Profile</button>
                <button class="message" onclick="window.location.href='messages.html'">Message</button>
            </div>

            <div class="stats">
                <div>
                    <h3>273</h3>
                    <p>Followers</p>
                </div>
                <div>
                    <h3>1070</h3>
                    <p>Following</p>
                </div>
                <div>
                    <h3>860</h3>
                    <p>Likes</p>
                </div>
                <div>
                    <h3 id="postCountStat">0</h3>
                    <p>Posts</p>
                </div>
            </div>

            <div class="posts-section">
                <h2>User Posts</h2>
                <div class="posts-grid" id="postsGrid"></div>
            </div>

            <footer class="footer">
                ©️ 2026 Maseera
            </footer>

        </div>
    </div>

    <div id="editModal" class="edit-modal">
        <div class="edit-box">
            <h2>Edit Profile</h2>

            <div class="edit-modal-header">
                <h3>Edit Profile</h3>
                <button class="edit-modal-close" onclick="closeEditModal()">✕</button>
            </div>

            <div class="edit-modal-body">
                <div class="edit-field">
                    <label>First Name</label>
                    <input type="text" id="editFirstName" placeholder="First name">
                </div>
                <div class="edit-field">
                    <label>Last Name</label>
                    <input type="text" id="editLastName" placeholder="Last name">
                </div>
                <div class="edit-field">
                    <label>Username</label>
                    <input type="text" id="editUsername" placeholder="Username">
                    <span class="edit-field-note">Changing your username will update all your posts.</span>
                </div>
                <div class="edit-field">
                    <label>Bio</label>
                    <textarea id="editBio" placeholder="Tell people about yourself..." rows="3"></textarea>
                </div>
            </div>

            <div id="editModalError" class="edit-modal-error" style="display:none;"></div>

            <div class="edit-modal-footer">
                <button class="edit-cancel-btn" onclick="closeEditModal()">Cancel</button>
                <button class="edit-save-btn" onclick="saveProfile()">Save</button>
            </div>
        </div>
    </div>

    <script>

        const params = new URLSearchParams(window.location.search);
        const usernameFromURL = params.get("user");

        let currentUser = JSON.parse(localStorage.getItem("user"));

        if (!currentUser) {
            window.location.href = "login.html";
        }

        let user = currentUser;

        if (usernameFromURL) {
            user = {
                username: usernameFromURL,
                firstName: usernameFromURL,
                lastName: ""
            };
        }

        document.getElementById("profileName").textContent =
            user.firstName + " " + user.lastName;

        document.getElementById("profileUsername").textContent =
            "@" + user.username;

        document.getElementById("avatarLetter").textContent =
            user.username.charAt(0).toUpperCase();

        document.getElementById("profileBio").textContent =
            user.bio || "No bio yet";

        // ================= POSTS =================

        function loadPosts() {
            let posts = JSON.parse(localStorage.getItem("userPosts") || "[]");
            posts = posts.filter(p => p.author === user.username);

            let grid = document.getElementById("postsGrid");

            grid.innerHTML = "";
            document.getElementById("postCountStat").textContent = posts.length;

            if (!posts.length) {
                grid.innerHTML = "<p>No posts yet</p>";
                return;
            }

            posts.forEach(post => {
                let div = document.createElement("div");
                div.className = "post";

                div.innerHTML = `
                ${post.fileType === 'video'
                        ? `<video class="post-media" autoplay muted loop></video>`
                        : `<img class="post-media">`
                    }

                ${user.username === currentUser.username ?
                        `<button class="delete-post-btn" onclick="deletePost('${post.id}', this)">X</button>`
                        : ""
                    }

                <div class="post-overlay">
                    <div class="overlay-item">
                        <img src="media/icons/heart.svg">
                        <span>${post.likes || 0}</span>
                    </div>
                    <div class="overlay-item">
                        <img src="media/icons/comments.svg">
                        <span>${post.comments || 0}</span>
                    </div>
                </div>
            `;

                grid.appendChild(div);

                const mediaElement = div.querySelector(".post-media");

                MediaStore.getURL(post.mediaKey).then(url => {
                    if (url) {
                        mediaElement.src = url;
                    }
                });
            });
        }

        loadPosts();

        // ================= DELETE =================

        function deletePost(id, btn) {
            let posts = JSON.parse(localStorage.getItem("userPosts") || "[]");

            const post = posts.find(p => String(p.id) === String(id));

            if (post && post.mediaKey) {
                MediaStore.remove(post.mediaKey);
            }

            posts = posts.filter(p => String(p.id) !== String(id));
            localStorage.setItem("userPosts", JSON.stringify(posts));

            btn.closest(".post").remove();
            loadPosts();
        }

        // ================= EDIT PROFILE =================

        function openEditModal() {
            const u = JSON.parse(localStorage.getItem('user') || '{}');
            document.getElementById('editFirstName').value = u.firstName || '';
            document.getElementById('editLastName').value = u.lastName || '';
            document.getElementById('editUsername').value = u.username || '';
            document.getElementById('editBio').value = u.bio || '';
            document.getElementById('editModalError').style.display = 'none';
            document.getElementById('editModalOverlay').style.display = 'flex';
        }

        function closeEditModal(e) {
            // Close when: called directly (no event), or user clicked the dark backdrop
            if (!e || e.target === document.getElementById('editModalOverlay')) {
                document.getElementById('editModalOverlay').style.display = 'none';
            }
        }

        function saveProfile() {
            const firstName = document.getElementById('editFirstName').value.trim();
            const lastName = document.getElementById('editLastName').value.trim();
            const username = document.getElementById('editUsername').value.trim().toLowerCase().replace(/\s+/g, '_');
            const bio = document.getElementById('editBio').value.trim();
            const errorEl = document.getElementById('editModalError');

            // Basic validation
            if (!username) {
                errorEl.textContent = 'Username cannot be empty.';
                errorEl.style.display = 'block';
                return;
            }
            if (!/^[a-z0-9_]+$/.test(username)) {
                errorEl.textContent = 'Username can only contain letters, numbers and underscores.';
                errorEl.style.display = 'block';
                return;
            }

            const u = JSON.parse(localStorage.getItem('user') || '{}');
            const oldUsername = u.username;

            // If username changed, update all userPosts that belong to this user
            if (oldUsername && username !== oldUsername) {
                const userPosts = JSON.parse(localStorage.getItem('userPosts') || '[]');
                userPosts.forEach(p => { if (p.author === oldUsername) p.author = username; });
                localStorage.setItem('userPosts', JSON.stringify(userPosts));

                // Update maseera_data user entry if it exists
                const mData = JSON.parse(localStorage.getItem('maseera_data') || '{}');
                if (mData.users) {
                    const mu = mData.users.find(u => u.id === oldUsername || u.username === oldUsername);
                    if (mu) {
                        mu.id = username;
                        mu.username = username;
                        mu.displayName = (firstName + ' ' + lastName).trim() || username;
                    }
                }
                localStorage.setItem('maseera_data', JSON.stringify(mData));
            }

            // Save updated user
            u.firstName = firstName;
            u.lastName = lastName;
            u.username = username;
            u.bio = bio;
            localStorage.setItem('user', JSON.stringify(u));

            // Update page display immediately
            const fullName = (firstName + ' ' + lastName).trim() || username;
            document.getElementById('profileName').textContent = fullName;
            document.getElementById('profileUsername').textContent = '@' + username;
            document.getElementById('avatarLetter').textContent = username.charAt(0).toUpperCase();

            // Update bio if there's a bio element
            const bioEl = document.getElementById('profileBio');
            if (bioEl) bioEl.textContent = bio;

            // Refresh in-memory vars
            currentUser = u;
            profileUserId = username;
            displayName = fullName;
            displayHandle = username;

            document.getElementById('editModalOverlay').style.display = 'none';
            loadPosts();
        }

        // ================= MENU =================

        function toggleMenu() {
            let menu = document.getElementById("sideMenu");
            menu.style.left = menu.style.left === "0px" ? "-220px" : "0px";
        }

        // ================= LOGOUT =================

        function logoutUser() {
            localStorage.removeItem("currentUser");
            window.location.href = "login.html";
        }

    </script>

</body>

</html>
