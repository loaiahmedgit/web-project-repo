<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="stylesheet" href="styles/profile.css">
</head>
<body>

    <div class="profile-card">

        <div class="cover"></div>

        <div class="profile-info">
            <div class="avatar" id="avatarLetter">A</div>

            <h2 id="profileName"></h2>
            <p class="username" id="profileUsername"></p>

            <div class="buttons">
                <button class="follow">Follow</button>
                <button class="message">Message</button>
            </div>

            <div class="stats">
                <div>
                    <h3>2.1M</h3>
                    <p>Followers</p>
                </div>

                <div>
                    <h3>840K</h3>
                    <p>Following</p>
                </div>

                <div>
                    <h3>48.6M</h3>
                    <p>Likes</p>
                </div>

                <div>
                    <h3>284</h3>
                    <p>Posts</p>
                </div>
            </div>

            <div class="badges">
                <span>Top Creator</span>
                <span>Verified</span>
                <span>Popular</span>
            </div>

            <div class="posts-section">
                <h2>User Posts</h2>

                <div class="posts-grid">
                    <div class="post">
                        <img src="media/images/post1.jpg" alt="Post 1">
                    </div>

                    <div class="post">
                        <img src="media/images/post2.jpg" alt="Post 2">
                    </div>

                    <div class="post">
                        <img src="media/images/post3.jpg" alt="Post 3">
                    </div>

                    <div class="post">
                        <img src="media/images/post4.jpg" alt="Post 4">
                    </div>

                    <div class="post">
                        <img src="media/images/post5.jpg" alt="Post 5">
                    </div>

                    <div class="post">
                        <img src="media/images/post6.jpg" alt="Post 6">
                    </div>
                </div>
            </div>

            <button class="logout" onclick="logoutUser()">Logout</button>
        </div>
    </div>

    <script>
        let currentUser = localStorage.getItem("currentUser");

        if (!currentUser) {
            window.location.href = "login.html";
        } else {
            document.getElementById("profileName").textContent = currentUser;
            document.getElementById("profileUsername").textContent = "@" + currentUser;
            document.getElementById("avatarLetter").textContent = currentUser.charAt(0).toUpperCase();
        }

        function logoutUser() {
            localStorage.removeItem("currentUser");
            window.location.href = "login.html";
        }
    </script>

</body>
</html>
