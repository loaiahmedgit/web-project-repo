<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>

    ```
    <link rel="stylesheet" href="styles/profile.css">
    <script src="media-store.js"></script>
    ```

</head>

<body>

    ```
    <div class="profile-card">

        <!-- TOP BAR -->
        <div class="top-bar">
            <div class="menu-icon" onclick="toggleMenu()">☰</div>

            <div class="site-logo">
                <img src="media/images/Orange Flash Logo.png">
            </div>
        </div>

        <!-- SIDE MENU -->
        <div class="side-menu" id="sideMenu">
            <a href="profile.html">Profile</a>
            <a href="create.html">Create Post</a>
            <a href="for_you_page.html">For You</a>
            <a href="#" onclick="logoutUser()">Logout</a>
        </div>

        <!-- COVER -->
        <div class="cover"></div>

        <!-- PROFILE INFO -->
        <div class="profile-info">

            <div class="avatar" id="avatarLetter">A</div>

            <h2 id="profileName"></h2>
            <p class="username" id="profileUsername"></p>

            <p class="bio" id="profileBio">No bio yet</p>

            <div class="buttons">
                <button class="edit-btn" onclick="openEdit()">Edit Profile</button>
                <button class="message" onclick="window.location.href='messages.html'">Message</button>
            </div>

            <!-- STATS -->
            <div class="stats">
                <div>
                    <h3>273</h3>
                    <p>Followers</p>
                </div>
                <div>
                    <h3>1070</h3>
                    <p>Following</p>
                </div>
                <div>
                    <h3>860</h3>
                    <p>Likes</p>
                </div>
                <div>
                    <h3 id="postCountStat">0</h3>
                    <p>Posts</p>
                </div>
            </div>

            <!-- POSTS -->
            <div class="posts-section">
                <h2>User Posts</h2>
                <div class="posts-grid" id="postsGrid"></div>
            </div>

            <footer class="footer">
                © 2026 Maseera
            </footer>

        </div>
    </div>

    <div id="editModal" class="edit-modal">
        <div class="edit-box">
            <h2>Edit Profile</h2>

            <input type="text" id="editFirstName" placeholder="First Name">
            <input type="text" id="editLastName" placeholder="Last Name">
            <input type="text" id="editUsername" placeholder="Username">
            <input type="password" id="editPassword" placeholder="New Password">

            <textarea id="editBio" placeholder="Write your bio..." rows="3"></textarea>

            <button onclick="saveProfile()">Save</button>
            <button onclick="closeEdit()">Cancel</button>
        </div>
    </div>

    <script>

        const params = new URLSearchParams(window.location.search);
        const usernameFromURL = params.get("user");

        let currentUser = JSON.parse(localStorage.getItem("user"));

        if (!currentUser) {
            window.location.href = "login.html";
        }

        let user = currentUser;

        if (usernameFromURL) {
            user = {
                username: usernameFromURL,
                firstName: usernameFromURL,
                lastName: ""
            };
        }

        document.getElementById("profileName").textContent =
            user.firstName + " " + user.lastName;

        document.getElementById("profileUsername").textContent =
            "@" + user.username;

        document.getElementById("avatarLetter").textContent =
            user.username.charAt(0).toUpperCase();

        document.getElementById("profileBio").textContent =
            user.bio || "No bio yet";

        // ================= POSTS =================

        function loadPosts() {
            let posts = JSON.parse(localStorage.getItem("userPosts") || "[]");
            posts = posts.filter(p => p.author === user.username);

            let grid = document.getElementById("postsGrid");

            grid.innerHTML = "";
            document.getElementById("postCountStat").textContent = posts.length;

            if (!posts.length) {
                grid.innerHTML = "<p>No posts yet</p>";
                return;
            }

            posts.forEach(post => {
                let div = document.createElement("div");
                div.className = "post";

                div.innerHTML = `
                ${post.fileType === 'video'
                        ? `<video class="post-media" autoplay muted loop></video>`
                        : `<img class="post-media">`
                    }

                ${user.username === currentUser.username ?
                        `<button class="delete-post-btn" onclick="deletePost('${post.id}', this)">X</button>`
                        : ""
                    }

                <div class="post-overlay">
                    <div class="overlay-item">
                        <img src="media/icons/heart.svg">
                        <span>${post.likes || 0}</span>
                    </div>
                    <div class="overlay-item">
                        <img src="media/icons/comments.svg">
                        <span>${post.comments || 0}</span>
                    </div>
                </div>
            `;

                grid.appendChild(div);

                const mediaElement = div.querySelector(".post-media");

                MediaStore.getURL(post.mediaKey).then(url => {
                    if (url) {
                        mediaElement.src = url;
                    }
                });
            });
        }

        loadPosts();

        // ================= DELETE =================

        function deletePost(id, btn) {
            let posts = JSON.parse(localStorage.getItem("userPosts") || "[]");

            const post = posts.find(p => String(p.id) === String(id));

            if (post && post.mediaKey) {
                MediaStore.remove(post.mediaKey);
            }

            posts = posts.filter(p => String(p.id) !== String(id));
            localStorage.setItem("userPosts", JSON.stringify(posts));

            btn.closest(".post").remove();
            loadPosts();
        }

        // ================= EDIT =================

        function openEdit() {
            if (user.username !== currentUser.username) return;

            document.getElementById("editFirstName").value = currentUser.firstName || "";
            document.getElementById("editLastName").value = currentUser.lastName || "";
            document.getElementById("editUsername").value = currentUser.username || "";
            document.getElementById("editBio").value = currentUser.bio || "";

            document.getElementById("editModal").style.display = "flex";
        }

        function closeEdit() {
            document.getElementById("editModal").style.display = "none";
        }

        function saveProfile() {
            let first = document.getElementById("editFirstName").value;
            let last = document.getElementById("editLastName").value;
            let username = document.getElementById("editUsername").value;
            let password = document.getElementById("editPassword").value;
            let bio = document.getElementById("editBio").value;

            currentUser.firstName = first;
            currentUser.lastName = last;
            currentUser.username = username;
            currentUser.bio = bio;

            if (password) currentUser.password = password;

            localStorage.setItem("user", JSON.stringify(currentUser));

            closeEdit();
            location.reload();
        }

        // ================= MENU =================

        function toggleMenu() {
            let menu = document.getElementById("sideMenu");
            menu.style.left = menu.style.left === "0px" ? "-220px" : "0px";
        }

        // ================= LOGOUT =================

        function logoutUser() {
            localStorage.removeItem("currentUser");
            window.location.href = "login.html";
        }

    </script>
    ```

</body>

</html>
