<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="styles/signup.css">
</head>

<body>

    <div class="form-box">
        <h1>Login</h1>

        <form id="loginForm">
            <label>Username</label>
            <input type="text" id="loginUsername" required>

            <label>Password</label>
            <input type="password" id="loginPassword" required>

            <button type="submit">Login</button>
        </form>

        <p id="loginMessage"></p>

        <p class="link-text">
            Don't have an account?
            <a href="register.html">Create one</a>
        </p>
    </div>

    <div class="social-login-outside">

        <div class="social-btn google" onclick="loginWithGoogle()">
            <img src="media/icons/google.png" alt="Google">
            <span>Continue with Google</span>
        </div>

        <div class="social-btn apple" onclick="loginWithApple()">
            <img src="media/icons/apple.png" alt="Apple">
            <span>Continue with Apple</span>
        </div>

    </div>

    <script>
        document.getElementById("loginForm").addEventListener("submit", function (event) {
            event.preventDefault();

            let username = document.getElementById("loginUsername").value.trim();
            let password = document.getElementById("loginPassword").value.trim();

            let storedUser = JSON.parse(localStorage.getItem("user"));

            if (!storedUser) {
                document.getElementById("loginMessage").textContent = "No account found.";
                return;
            }

            if (username === storedUser.username && password === storedUser.password) {
                localStorage.setItem("currentUser", username);
                window.location.href = "profile.html";
            } else {
                document.getElementById("loginMessage").textContent =
                    "Incorrect username or password.";
            }
        });

        function loginWithGoogle() {
            let user = {
                firstName: "Google",
                lastName: "User",
                username: "google_" + Math.floor(Math.random() * 1000)
            };

            localStorage.setItem("user", JSON.stringify(user));
            localStorage.setItem("currentUser", user.username);

            window.location.href = "profile.html";
        }

        function loginWithApple() {
            let user = {
                firstName: "Apple",
                lastName: "User",
                username: "apple_" + Math.floor(Math.random() * 1000)
            };

            localStorage.setItem("user", JSON.stringify(user));
            localStorage.setItem("currentUser", user.username);

            window.location.href = "profile.html";
        }
    </script>

</body>

</html>
