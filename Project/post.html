<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maseera - Post</title>
  <link rel="stylesheet" href="./styles/post.css">
  <script src="./media-store.js"></script>
  <script src="./for_you_data.js"></script>
</head>

<body>

  <!-- Top Navigation -->
  <nav class="top-nav">
    <button class="back-btn" onclick="window.history.back()">&#8592; Back</button>
    <div class="nav-brand">
      <img src="./media/images/Orange Flash Logo.png" alt="Maseera" class="nav-logo">
      <span class="nav-title">MASEERA</span>
    </div>
    <div class="nav-links">
      <a href="for_you_page.html" class="nav-link">For You</a>
      <a href="messages.html" class="nav-link">Messages</a>
      <a href="profile.html" class="nav-link">Profile</a>
    </div>
  </nav>

  <!-- Two-column layout: Post + Comments -->
  <div class="post-layout">

    <!-- LEFT: Post content -->
    <div class="post-main">

      <!-- Post Header -->
      <div class="post-header">
        <div class="post-author-info">
          <div class="author-avatar" id="postAuthorAvatar">A</div>
          <div class="author-details">
            <a href="profile.html" class="author-name" id="postAuthorName">@alexdancer</a>
            <span class="post-time" id="postTime">3 hours ago</span>
          </div>
        </div>
        <button class="follow-btn-post" id="followBtn" onclick="toggleFollow(this)">+ Follow</button>
      </div>

      <!-- Post Media (image or video) -->
      <div class="post-image-container" id="postMediaContainer">
        <img src="./media/images/Post_1.png" alt="Post" class="post-image" id="postImage">
      </div>

      <!-- Caption & Hashtags -->
      <div class="post-caption">
        <p id="postCaption">Check out this amazing moment! ✨</p>
        <div class="post-hashtags" id="postHashtags"></div>
      </div>

      <!-- Like / Comment / Share Actions -->
      <div class="post-actions-bar">
        <button class="post-action-btn like-post-btn" id="likeBtn" onclick="toggleLike(this)">
          <span class="action-icon">&#x1F90D;</span>
          <span class="action-label" id="likeCount">0</span>
          <span class="action-text">Likes</span>
        </button>
        <button class="post-action-btn comment-post-btn" onclick="focusCommentInput()">
          <span class="action-icon">&#x1F4AC;</span>
          <span class="action-label" id="commentCount">0</span>
          <span class="action-text">Comments</span>
        </button>
        <button class="post-action-btn share-post-btn" onclick="openShareModal()">
          <span class="action-icon">&#x2197;</span>
          <span class="action-label">Share</span>
          <span class="action-text">Share</span>
        </button>
      </div>

    </div>

    <!-- RIGHT: Comments panel -->
    <div class="post-comments-panel">

      <div class="comments-panel-header">
        <h2>Comments</h2>
        <span class="comment-total" id="commentTotal">0</span>
      </div>

      <div class="comments-scroll" id="commentsScroll">
        <ul class="comments-list" id="commentsList"></ul>
      </div>

      <div class="comment-input-section">
        <form class="comment-submit-form" onsubmit="submitComment(event)">
          <input type="text" id="commentInput" class="comment-text-input" placeholder="Add a comment..."
            aria-label="Write a comment">
          <button type="submit" class="submit-comment-btn">Post</button>
        </form>
      </div>

    </div>
  </div>

  <!-- Share Modal -->
  <div class="share-modal-overlay" id="shareModal" onclick="handleModalOverlayClick(event)">
    <div class="share-modal-box">
      <div class="share-modal-header">
        <h3>Share Post</h3>
        <button class="close-modal-btn" onclick="closeShareModal()">&#x2715;</button>
      </div>
      <div class="share-options">
        <button class="share-option-btn copy-link-btn" onclick="copyPostLink()">
          <span class="share-option-icon">&#x1F517;</span>
          <span>Copy Link</span>
        </button>
        <button class="share-option-btn send-message-btn" onclick="shareToMessages()">
          <span class="share-option-icon">&#x2709;&#xFE0F;</span>
          <span>Send to Messages</span>
        </button>
      </div>
      <p class="copy-feedback" id="copyFeedback"></p>
    </div>
  </div>

  <script>
    // ── Helpers ───────────────────────────────────────────────────────
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.appendChild(document.createTextNode(String(text || '')));
      return div.innerHTML;
    }

    function fmtCount(n) {
      n = parseInt(n) || 0;
      if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
      if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
      return String(n);
    }

    // ── Read URL params ───────────────────────────────────────────────
    const params = new URLSearchParams(window.location.search);
    const postId = params.get('post') || '1';
    const author = params.get('author') || 'alexdancer';
    const rawCap = params.get('caption');
    const caption = rawCap ? decodeURIComponent(rawCap) : '';

    // ── Set author info ───────────────────────────────────────────────
    document.getElementById('postAuthorName').textContent = '@' + author;
    document.getElementById('postAuthorAvatar').textContent = author.charAt(0).toUpperCase();
    document.getElementById('postCaption').textContent = caption;

    // ── Load post media & stats ───────────────────────────────────────
    const maseeraData = JSON.parse(localStorage.getItem('maseera_data') || '{}');
    const userPosts = JSON.parse(localStorage.getItem('userPosts') || '[]');

    let foundPost = (maseeraData.posts || []).find(p => String(p.id) === String(postId))
      || userPosts.find(p => String(p.id) === String(postId));

    function setMedia(url, isVideo) {
      const container = document.getElementById('postMediaContainer');
      if (isVideo) {
        container.innerHTML = `<video src="${url}" class="post-image" controls autoplay loop playsinline style="width:100%;height:100%;object-fit:cover;"></video>`;
      } else {
        container.innerHTML = `<img src="${url}" alt="Post" class="post-image" id="postImage">`;
      }
    }

    if (foundPost) {
      const isVideo = foundPost.type === 'video' || foundPost.fileType === 'video';
      document.getElementById('likeCount').textContent = fmtCount(foundPost.likes || 0);
      document.getElementById('commentCount').textContent = fmtCount(foundPost.comments || 0);
      document.getElementById('commentTotal').textContent = fmtCount(foundPost.comments || 0);

      // Hashtags
      if (foundPost.hashtags && foundPost.hashtags.length) {
        document.getElementById('postHashtags').innerHTML =
          foundPost.hashtags.map(t => `<span class="hashtag">#${escapeHtml(t)}</span>`).join('');
      }

      if (foundPost.mediaKey) {
        // User-created post stored in IndexedDB via MediaStore
        MediaStore.getURL(foundPost.mediaKey).then(url => {
          if (url) setMedia(url, isVideo);
        });
      } else if (foundPost.mediaPath) {
        setMedia(foundPost.mediaPath, isVideo);
      } else if (foundPost.mediaURL) {
        setMedia(foundPost.mediaURL, isVideo);
      }
    }

    // ── Load comments ─────────────────────────────────────────────────
    function loadComments() {
      const list = document.getElementById('commentsList');

      // Check commentsData (from for_you_page interactions)
      const commentsData = JSON.parse(localStorage.getItem('commentsData') || '{}');
      const maseeraFresh = JSON.parse(localStorage.getItem('maseera_data') || '{}');
      const maseeraComments = maseeraFresh.comments && maseeraFresh.comments[postId];

      let items = [];

      if (commentsData[postId] && commentsData[postId].items && commentsData[postId].items.length) {
        // Comments saved from for_you_page or post.html interactions
        items = commentsData[postId].items;
        const count = commentsData[postId].count || items.length;
        document.getElementById('commentTotal').textContent = fmtCount(count);
        document.getElementById('commentCount').textContent = fmtCount(count);

      } else if (maseeraComments && maseeraComments.length) {
        // Fallback: demo comments from maseera_data
        items = maseeraComments.map(c => ({
          i: (c.userId || 'U').charAt(0).toUpperCase(),
          name: c.userId || 'User',
          handle: '@' + (c.userId || 'user'),
          time: 'now',
          text: c.text || '',
          likes: c.likes || 0,
          pinned: c.pinned || false
        }));
        document.getElementById('commentTotal').textContent = fmtCount(items.length);
        document.getElementById('commentCount').textContent = fmtCount(items.length);
      }

      if (!items.length) {
        list.innerHTML = `<li style="text-align:center;color:#808080;padding:24px 0;font-size:14px;">No comments yet. Be the first!</li>`;
        return;
      }

      list.innerHTML = items.map(c => `
        <li class="comment-item ${c.pinned ? 'pinned-comment' : ''}">
          <div class="comment-avatar">${escapeHtml(c.i || 'U')}</div>
          <div class="comment-body">
            <div class="comment-meta">
              <span class="comment-user">${escapeHtml(c.name || '')}</span>
              <span class="comment-handle">${escapeHtml(c.handle || '')}</span>
              ${c.pinned
          ? `<span class="pinned-label">&#x1F4CC; Pinned</span>`
          : `<span class="comment-time">${escapeHtml(c.time || '')}</span>`}
            </div>
            <p class="comment-text">${escapeHtml(c.text || '')}</p>
            <button class="comment-like-btn" onclick="toggleCommentLike(this)">
              <span class="heart-icon">&#x1F90D;</span>
              <span class="clc">${fmtCount(c.likes || 0)}</span>
            </button>
          </div>
        </li>
      `).join('');
    }

    loadComments();

    // ── Submit comment ────────────────────────────────────────────────
    function submitComment(e) {
      e.preventDefault();
      const input = document.getElementById('commentInput');
      const text = input.value.trim();
      if (!text) return;

      const userData = JSON.parse(localStorage.getItem('user') || '{}');
      const myName = ((userData.firstName || '') + ' ' + (userData.lastName || '')).trim() || 'You';
      const myHandle = '@' + (userData.username || 'you');
      const myInit = myName.charAt(0).toUpperCase();

      // Save to commentsData in localStorage
      let commentsData = JSON.parse(localStorage.getItem('commentsData') || '{}');
      if (!commentsData[postId]) {
        commentsData[postId] = { label: `@${author}'s post`, count: 0, items: [] };
      }
      commentsData[postId].items.push({
        i: myInit, name: myName, handle: myHandle,
        time: 'just now', text, likes: 0, pinned: false
      });
      commentsData[postId].count++;
      localStorage.setItem('commentsData', JSON.stringify(commentsData));

      // Update comment count on the post stats
      const newCount = commentsData[postId].count;
      document.getElementById('commentTotal').textContent = fmtCount(newCount);
      document.getElementById('commentCount').textContent = fmtCount(newCount);

      loadComments();
      input.value = '';

      const scroll = document.getElementById('commentsScroll');
      scroll.scrollTop = scroll.scrollHeight;
    }

    // ── Like / Follow / Comment Like ──────────────────────────────────
    let liked = false;
    function toggleLike(btn) {
      liked = !liked;
      btn.querySelector('.action-icon').innerHTML = liked ? '&#x2764;&#xFE0F;' : '&#x1F90D;';
      btn.classList.toggle('liked', liked);
    }

    function toggleFollow(btn) {
      const isFollowing = btn.classList.contains('following');
      btn.textContent = isFollowing ? '+ Follow' : 'Following';
      btn.classList.toggle('following', !isFollowing);
    }

    function toggleCommentLike(btn) {
      btn.classList.toggle('liked');
      btn.querySelector('.heart-icon').innerHTML =
        btn.classList.contains('liked') ? '&#x2764;&#xFE0F;' : '&#x1F90D;';
    }

    function focusCommentInput() {
      const input = document.getElementById('commentInput');
      input.focus();
      input.scrollIntoView({ behavior: 'smooth' });
    }

    // ── Share modal ───────────────────────────────────────────────────
    function openShareModal() {
      document.getElementById('shareModal').classList.add('active');
      document.getElementById('copyFeedback').textContent = '';
    }

    function closeShareModal() {
      document.getElementById('shareModal').classList.remove('active');
    }

    function handleModalOverlayClick(e) {
      if (e.target.id === 'shareModal') closeShareModal();
    }

    function copyPostLink() {
      const url = window.location.href;
      if (navigator.clipboard) {
        navigator.clipboard.writeText(url).then(showCopied).catch(() => fallbackCopy(url));
      } else {
        fallbackCopy(url);
      }
    }

    function fallbackCopy(url) {
      const el = document.createElement('textarea');
      el.value = url;
      document.body.appendChild(el);
      el.select();
      document.execCommand('copy');
      document.body.removeChild(el);
      showCopied();
    }

    function showCopied() {
      document.getElementById('copyFeedback').innerHTML = '&#x2713; Link copied to clipboard!';
    }

    function shareToMessages() {
      const shareData = { postId, author, caption };
      window.location.href = 'messages.html?sharedPost=' + encodeURIComponent(JSON.stringify(shareData));
    }
  </script>

</body>

</html>
