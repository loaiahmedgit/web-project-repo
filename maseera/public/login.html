<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="styles/signup.css">
</head>

<body>

    <div class="form-box">
        <h1>Login</h1>

        <form id="loginForm">
            <label>Username</label>
            <input type="text" id="loginUsername" required>

            <label>Password</label>
            <input type="password" id="loginPassword" required>

            <button type="submit">Login</button>
        </form>

        <p id="loginMessage"></p>

        <p class="link-text">
            Don't have an account?
            <a href="register.html">Create one</a>
        </p>
    </div>

    <div class="social-login-outside">

        <div class="social-btn google" onclick="loginWithGoogle()">
            <img src="media/icons/google.png" alt="Google">
            <span>Continue with Google</span>
        </div>

        <div class="social-btn apple" onclick="loginWithApple()">
            <img src="media/icons/apple.png" alt="Apple">
            <span>Continue with Apple</span>
        </div>

    </div>

    <script>
        document.getElementById("loginForm").addEventListener("submit", async function (event) {
            event.preventDefault();

            const username = document.getElementById("loginUsername").value.trim();
            const password = document.getElementById("loginPassword").value.trim();
            const msgEl    = document.getElementById("loginMessage");

            msgEl.textContent = "Logging in…";

            try {
                const res  = await fetch("/api/auth/login", {
                    method:  "POST",
                    headers: { "Content-Type": "application/json" },
                    body:    JSON.stringify({ username, password }),
                });

                if (res.ok) {
                    const user = await res.json();
                    sessionStorage.setItem("currentUser", JSON.stringify(user));
                    window.location.href = "for_you_page.html";
                } else {
                    const err = await res.json();
                    msgEl.textContent = err.error || "Incorrect username or password.";
                }
            } catch {
                msgEl.textContent = "Connection error. Is the server running?";
            }
        });

        function loginWithGoogle() {
            // Dev stub — social login not connected to DB
            alert("Social login not available. Use username/password.");
        }

        function loginWithApple() {
            // Dev stub — social login not connected to DB
            alert("Social login not available. Use username/password.");
        }
    </script>

</body>

</html>
