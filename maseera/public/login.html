<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Maseera</title>
    <link rel="stylesheet" href="styles/signup.css">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>

<body onload="if(typeof lucide!=='undefined') lucide.createIcons();">

    <div class="auth-wrapper">

        <div class="auth-brand">
            <div class="auth-brand-mark">
                <div class="auth-brand-diamond">M</div>
                <span class="auth-brand-name">Maseera</span>
            </div>
            <span class="auth-brand-tagline">share your story</span>
        </div>

        <div class="auth-card">
            <h2 class="auth-card-title">Welcome back</h2>
            <p class="auth-card-subtitle">Sign in to your account to continue</p>

            <div class="auth-error-banner" id="errorBanner"></div>

            <form class="auth-form" id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="loginUsername">Username</label>
                    <input class="form-input" type="text" id="loginUsername" placeholder="Enter your username" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="loginPassword">Password</label>
                    <input class="form-input" type="password" id="loginPassword" placeholder="Enter your password" required>
                </div>

                <button type="submit" class="auth-submit-btn" id="submitBtn">Sign In</button>
            </form>
        </div>

        <p class="auth-footer">
            Don't have an account? <a href="register.html">Create one</a>
        </p>

    </div>

    <script>
        document.getElementById("loginForm").addEventListener("submit", async function (event) {
            event.preventDefault();

            const username  = document.getElementById("loginUsername").value.trim();
            const password  = document.getElementById("loginPassword").value.trim();
            const errorEl   = document.getElementById("errorBanner");
            const submitBtn = document.getElementById("submitBtn");

            errorEl.classList.remove("visible");
            submitBtn.disabled = true;
            submitBtn.textContent = "Signing in…";

            try {
                const res = await fetch("/api/auth/login", {
                    method:  "POST",
                    headers: { "Content-Type": "application/json" },
                    body:    JSON.stringify({ username, password }),
                });

                if (res.ok) {
                    const user = await res.json();
                    sessionStorage.setItem("currentUser", JSON.stringify(user));
                    window.location.href = "for_you_page.html";
                } else {
                    const err = await res.json();
                    errorEl.textContent = err.error || "Incorrect username or password.";
                    errorEl.classList.add("visible");
                    submitBtn.disabled = false;
                    submitBtn.textContent = "Sign In";
                }
            } catch {
                errorEl.textContent = "Connection error. Is the server running?";
                errorEl.classList.add("visible");
                submitBtn.disabled = false;
                submitBtn.textContent = "Sign In";
            }
        });
    </script>

</body>

</html>
