<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <script>if(!sessionStorage.getItem('currentUser'))location.replace('login.html');</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Messages — Maseera</title>
  <link rel="stylesheet" href="styles/messages.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>

<body onload="if(typeof lucide!=='undefined') lucide.createIcons();">

  <!-- NAVBAR -->
  <nav class="top-nav">
    <span></span>
    <div class="nav-brand">
      <div class="brand-diamond"></div>
      <span class="nav-title">Maseera</span>
    </div>
    <div class="nav-links">
      <a href="for_you_page.html" class="nav-link">For You</a>
      <a href="profile.html" class="nav-link">Profile</a>
      <a href="messages.html" class="nav-link active">Messages</a>
    </div>
  </nav>

  <!-- MAIN -->
  <div class="messages-layout" id="messagesLayout">

    <!-- LEFT: conversation list -->
    <div class="conversations-panel" id="conversationsPanel"></div>

    <!-- RIGHT: chat -->
    <div class="chat-panel">
      <div class="chat-header">
        <button class="mobile-back-btn" onclick="document.getElementById('messagesLayout').classList.remove('chat-active')">&#8592; Back</button>
        <h3 id="chatName">Select a conversation</h3>
      </div>
      <div class="messages-area" id="messagesArea"></div>
      <div class="message-input-area">
        <form class="message-form" onsubmit="sendMessage(event)">
          <input type="text" id="messageInput" class="message-text-input" placeholder="Type a message...">
          <button type="submit" class="send-btn">Send</button>
        </form>
      </div>
    </div>

  </div>

  <!-- Mobile bottom nav -->
  <nav class="mobile-bottom-nav">
    <a href="for_you_page.html" class="mob-nav-btn"><i data-lucide="home"></i><span>Home</span></a>
    <a href="create.html" class="mob-nav-btn"><i data-lucide="plus-circle"></i><span>Create</span></a>
    <a href="messages.html" class="mob-nav-btn active"><i data-lucide="message-circle"></i><span>Messages</span></a>
    <a href="profile.html" class="mob-nav-btn"><i data-lucide="user"></i><span>Profile</span></a>
  </nav>

  <script>
    const me = (() => { try { return JSON.parse(sessionStorage.getItem('currentUser')); } catch { return null; } })();
    if (!me?.id) location.replace('login.html');

    const params        = new URLSearchParams(window.location.search);
    const toParam       = params.get('to');        // username
    const toIdParam     = params.get('toId');       // user ID (direct)
    const toNameParam   = params.get('toName');
    const sharedPostRaw = params.get('sharedPost');

    let currentPartnerId = null;
    let lastMessageCount = 0;
    let pollTimer = null;

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── Sidebar ──────────────────────────────────────────────────────────────
    function renderSidebar(partners) {
      const panel = document.getElementById('conversationsPanel');
      panel.innerHTML = '';
      if (!partners.length) {
        panel.innerHTML = '<p style="padding:20px;color:var(--c-text-3);font-size:13px;text-align:center;">No conversations yet</p>';
        return;
      }
      for (const p of partners) {
        const initial = (p.displayName || p.username || '?').charAt(0).toUpperCase();
        const item = document.createElement('div');
        item.className = 'conversation-item' + (p.id === currentPartnerId ? ' active' : '');
        item.dataset.initial   = initial;
        item.dataset.username  = p.username || '';
        item.dataset.partnerId = p.id;
        item.textContent = p.displayName || p.username;
        item.onclick = () => openChat(p);
        panel.appendChild(item);
      }
    }

    // ── Messages ─────────────────────────────────────────────────────────────
    function renderMessages(messages) {
      const area = document.getElementById('messagesArea');
      const atBottom = area.scrollHeight - area.clientHeight <= area.scrollTop + 60;
      area.innerHTML = '';
      for (const msg of messages) {
        const isSent = msg.senderId === me.id;
        const div = document.createElement('div');
        div.className = 'message ' + (isSent ? 'sent' : 'received');
        div.innerHTML = `<div class="msg-bubble">${escapeHtml(msg.content)}</div>`;
        area.appendChild(div);
      }
      if (atBottom || lastMessageCount === 0) area.scrollTop = area.scrollHeight;
      lastMessageCount = messages.length;
    }

    async function fetchMessages() {
      if (!currentPartnerId) return;
      try {
        const res = await fetch(`/api/messages?userIdA=${encodeURIComponent(me.id)}&userIdB=${encodeURIComponent(currentPartnerId)}`);
        if (!res.ok) return;
        const msgs = await res.json();
        if (msgs.length !== lastMessageCount) renderMessages(msgs);
      } catch {}
    }

    // ── Open conversation ─────────────────────────────────────────────────────
    async function openChat(partner) {
      currentPartnerId = partner.id;
      lastMessageCount = 0;

      document.getElementById('chatName').textContent = partner.displayName || partner.username;
      document.querySelectorAll('.conversation-item').forEach(i => {
        i.classList.toggle('active', i.dataset.partnerId === partner.id);
      });
      document.getElementById('messagesLayout').classList.add('chat-active');

      await fetchMessages();

      // Mark received messages from this partner as read
      fetch('/api/messages/read', {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ receiverId: me.id, senderId: partner.id }),
      }).catch(() => {});

      clearInterval(pollTimer);
      pollTimer = setInterval(fetchMessages, 4000);
    }

    // ── Load conversation list ────────────────────────────────────────────────
    async function loadConversations() {
      try {
        const res = await fetch('/api/conversations?userId=' + encodeURIComponent(me.id));
        if (!res.ok) return [];
        return res.json();
      } catch { return []; }
    }

    // ── Send message ──────────────────────────────────────────────────────────
    async function sendMessage(e) {
      e.preventDefault();
      const input = document.getElementById('messageInput');
      const text  = input.value.trim();
      if (!text || !currentPartnerId) return;
      input.value = '';

      try {
        const res = await fetch('/api/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ senderId: me.id, receiverId: currentPartnerId, content: text }),
        });
        if (res.ok) {
          await fetchMessages();
          // Refresh sidebar so new conversations appear
          loadConversations().then(renderSidebar);
        }
      } catch {}
    }

    // ── Initialise ────────────────────────────────────────────────────────────
    async function init() {
      const partners = await loadConversations();
      renderSidebar(partners);

      let target = null;

      if (toIdParam) {
        // Direct user ID provided (future-proof)
        target = partners.find(p => p.id === toIdParam)
          || { id: toIdParam, username: toIdParam, displayName: toNameParam || toIdParam };
      } else if (toParam) {
        // Username provided — check partners first, then resolve via API
        target = partners.find(p => p.username === toParam);
        if (!target) {
          try {
            const res = await fetch('/api/users?username=' + encodeURIComponent(toParam));
            if (res.ok) target = await res.json();
          } catch {}
        }
        // Show them in sidebar even if no conversation history yet
        if (target && !partners.find(p => p.id === target.id)) {
          renderSidebar([target, ...partners]);
        }
      }

      if (target) {
        await openChat(target);

        // Send shared post as a plain-text message
        if (sharedPostRaw) {
          try {
            const shared  = JSON.parse(decodeURIComponent(sharedPostRaw));
            const caption = shared.caption || 'Check out this post!';
            const author  = shared.author ? ' by @' + shared.author : '';
            await fetch('/api/messages', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                senderId:   me.id,
                receiverId: target.id,
                content:    `Shared a post${author}: ${caption}`,
              }),
            });
            await fetchMessages();
          } catch {}
        }
      } else if (partners.length > 0) {
        await openChat(partners[0]);
      }
    }

    init();
  </script>

</body>
</html>
