<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account</title>
    <link rel="stylesheet" href="styles/signup.css">
</head>

<body>

    <div class="form-box">
        <h1>Create Account</h1>

        <form id="createForm">
            <label>First Name</label>
            <input type="text" id="firstName" required>

            <label>Last Name</label>
            <input type="text" id="lastName" required>

            <label>Email</label>
            <input type="email" id="email" required>

            <label>Username</label>
            <input type="text" id="newUsername" required>

            <label>Password</label>
            <input type="password" id="newPassword" required>

            <p id="passwordHint" style="font-size:14px; margin-top:5px;"></p>

            <button type="submit">Create Account</button>
        </form>

        <p id="createMessage"></p>

        <p class="link-text">
            Already have an account?
            <a href="login.html">Login</a>
        </p>
    </div>

    <script>
        let passwordInput = document.getElementById("newPassword");
        let hint = document.getElementById("passwordHint");

        passwordInput.addEventListener("input", function () {

            let value = passwordInput.value;

            let hasUpper = /[A-Z]/.test(value);
            let hasLower = /[a-z]/.test(value);
            let hasNumber = /\d/.test(value);
            let isLong = value.length >= 6;

            if (value.length === 0) {
                hint.textContent = "";
                return;
            }

            if (hasUpper && hasLower && hasNumber && isLong) {
                hint.textContent = "Strong password ✅";
                hint.style.color = "lightgreen";
            } else {
                hint.textContent = "Weak password ❌ (Use A, a, 1 and 6+ chars)";
                hint.style.color = "red";
            }
        });

        document.getElementById("createForm").addEventListener("submit", async function (event) {
            event.preventDefault();

            const firstName = document.getElementById("firstName").value.trim();
            const lastName  = document.getElementById("lastName").value.trim();
            const email     = document.getElementById("email").value.trim();
            const username  = document.getElementById("newUsername").value.trim();
            const password  = passwordInput.value.trim();
            const msgEl     = document.getElementById("createMessage");

            const strongPassword = /^(?=.*[A-Z])(?=.*[a-z])(?=.*\d).{6,}$/;

            if (!strongPassword.test(password)) {
                msgEl.textContent = "Password is not strong enough.";
                return;
            }

            if (!firstName || !lastName || !email || !username || !password) {
                msgEl.textContent = "Please fill in all fields.";
                return;
            }

            msgEl.textContent = "Creating account…";

            try {
                const res = await fetch("/api/users", {
                    method:  "POST",
                    headers: { "Content-Type": "application/json" },
                    body:    JSON.stringify({
                        username,
                        displayName: firstName + " " + lastName,
                        email,
                        password,
                    }),
                });

                if (res.ok || res.status === 201) {
                    msgEl.style.color = "lightgreen";
                    msgEl.textContent = "Account created! Redirecting to login…";
                    document.getElementById("createForm").reset();
                    setTimeout(() => { window.location.href = "login.html"; }, 1500);
                } else {
                    const err = await res.json();
                    msgEl.style.color = "red";
                    msgEl.textContent = err.error || "Registration failed.";
                }
            } catch {
                msgEl.style.color = "red";
                msgEl.textContent = "Connection error. Is the server running?";
            }
        });
    </script>

</body>

</html>
